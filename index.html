<!DOCTYPE html>
<html lang="id">
<head>

<title>Simulasi Pemuaian</title>

<style>

.container {
  padding: 20px;
}

h1 {

}

.volume { background: #c62828; }

  </button>

  <button class="button luas" onclick="go('luas.html')">
    🟩 Pemuaian Luas

<div class="footer">
  © 2026 Pak Dwi Yono
</div>

</div>
